<!DOCTYPE html>

<div class="wrap">

<rect x="20" y="20" width="860" height="30" rx="6" fill="#0F6E56"/>
<text x="450" y="39" text-anchor="middle" font-size="13" font-weight="500" fill="#E1F5EE" font-family="inherit">EVALUATORS — Score Submission</text>

<rect x="360" y="68" width="180" height="56" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.8"/>

<text x="450" y="117" text-anchor="middle" font-size="10" fill="#1D9E75" font-family="inherit">Locked in DB</text>

<rect x="690" y="68" width="180" height="56" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.8"/>

<!-- No branch -->
